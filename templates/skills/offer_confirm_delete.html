{% extends 'base/base.html' %}

{% block title %}Delete Offer - SkillSwap{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card animate-fade-in">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Delete Offer</h3>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Are you sure you want to delete this offer?</p>
                    <p><strong>{{ object.skill.name }}</strong> - ₹{{ object.hourly_rate }}/hr</p>
                    <p class="text-danger">This action cannot be undone!</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-2"></i>Yes, Delete
                            </button>
                            <a href="{% url 'offer-detail' object.id %}" class="btn btn-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
