{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title|default:"Create Offer" }} - SkillSwap{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card animate-fade-in">
                <div class="card-header">
                    <h3 class="mb-0"><i class="fas fa-tags me-2"></i>{{ title|default:"Create Skill Offer" }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-save me-2"></i>Save Offer
                            </button>
                            <a href="{% url 'skills:offer-list' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
