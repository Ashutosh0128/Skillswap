{% extends 'base/base.html' %}

{% block title %}Password Reset Complete - SkillSwap{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card animate-fade-in">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Reset Complete</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <p class="lead">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'users:login' %}" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
